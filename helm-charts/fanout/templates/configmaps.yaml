{{- $feed := .Values.feedService -}}
{{- $like := .Values.likeService -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: feed-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    run_address: {{ $feed.config.runAddress | quote }}
    database_uri: {{ $feed.config.databaseUri | quote }}
    like_service_url: {{ $feed.config.likeServiceUrl | quote }}
    migrations_path: {{ $feed.config.migrationsPath | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: like-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    run_address: {{ $like.config.runAddress | quote }}
    database_uri: {{ $like.config.databaseUri | quote }}
    migrations_path: {{ $like.config.migrationsPath | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: assistant-collect-script-config
  namespace: {{ .Release.Namespace }}
data:
  run_stress_collect.sh: |
{{- .Files.Get "files/assistant/run_stress_collect.sh" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: assistant-compare-script-config
  namespace: {{ .Release.Namespace }}
data:
  compare_and_analyze.sh: |
{{- .Files.Get "files/assistant/compare_and_analyze.sh" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promql-queries-config
  namespace: {{ .Release.Namespace }}
data:
  queries.txt: |
{{- .Files.Get "files/prometheus/queries.txt" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts-config
  namespace: {{ .Release.Namespace }}
data:
  load_k6_feed.js: |
{{- .Files.Get "files/k6/load_k6_feed.js" | nindent 4 }}
  config.json: |
{{- .Files.Get "files/k6/config.json" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-prompts-config
  namespace: {{ .Release.Namespace }}
data:
  comparison-prompt.txt: |
{{- .Files.Get "files/prompts/comparison-prompt.txt" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: html-template-config
  namespace: {{ .Release.Namespace }}
data:
  template.html: |
{{- .Files.Get "files/report-template.html" | nindent 4 }}
