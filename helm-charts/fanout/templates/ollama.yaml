{{- $ollama := .Values.ollama -}}
{{- if $ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: {{ $ollama.image | quote }}
          ports:
            - containerPort: {{ $ollama.port }}
          command: ["sh", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              ollama pull {{ $ollama.model }}
              ollama cp {{ $ollama.model }} default || true
              wait
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: {{ $ollama.port }}
      targetPort: {{ $ollama.port }}
{{- end }}
