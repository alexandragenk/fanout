{{- if .Values.ollama.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ include "fanout.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: {{ printf "%s:%s" .Values.ollama.image.repository .Values.ollama.image.tag | quote }}
          ports:
            - containerPort: {{ .Values.ollama.port }}
          command: ["sh", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              ollama pull {{ .Values.ollama.model }}
              ollama cp {{ .Values.ollama.model }} default || true
              wait
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ include "fanout.namespace" . }}
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: {{ .Values.ollama.port }}
      targetPort: {{ .Values.ollama.port }}
{{- end }}
