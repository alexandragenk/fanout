apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed
  namespace: {{ include "fanout.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feed
  template:
    metadata:
      labels:
        app: feed
        app.kubernetes.io/name: feed
        metrics_group: feed
    spec:
      containers:
        - name: feed
          image: {{ printf "%s:%s" .Values.feedService.image.repository .Values.feedService.image.tag | quote }}
          imagePullPolicy: {{ .Values.feedService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.feedService.port }}
          env:
            - name: CONFIG_PATH
              value: /app/config.yaml
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.secretName }}
                  key: {{ .Values.postgres.passwordKey }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.feedService.port }}
            initialDelaySeconds: {{ .Values.feedService.probes.readinessInitialDelaySeconds }}
            periodSeconds: {{ .Values.feedService.probes.readinessPeriodSeconds }}
          livenessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.feedService.port }}
            initialDelaySeconds: {{ .Values.feedService.probes.livenessInitialDelaySeconds }}
            periodSeconds: {{ .Values.feedService.probes.livenessPeriodSeconds }}
      volumes:
        - name: config
          configMap:
            name: feed-svc-config
---
apiVersion: v1
kind: Service
metadata:
  name: feed-svc
  namespace: {{ include "fanout.namespace" . }}
  labels:
    app: feed
spec:
  selector:
    app: feed
  ports:
    - name: http
      port: {{ .Values.feedService.port }}
      targetPort: {{ .Values.feedService.port }}
---
