{{- $repo := .Values.artifactRepository -}}
{{- $minio := $repo.minio -}}
{{- $s3 := $repo.s3 -}}
{{- if $repo.enabled }}
{{- if $minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $minio.serviceName }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ $minio.serviceName }}
  ports:
    - name: api
      port: {{ $minio.service.apiPort }}
      targetPort: {{ $minio.service.apiPort }}
    - name: console
      port: {{ $minio.service.consolePort }}
      targetPort: {{ $minio.service.consolePort }}
{{- if $minio.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $minio.serviceName }}-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $minio.storage.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $minio.serviceName }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $minio.serviceName }}
  template:
    metadata:
      labels:
        app: {{ $minio.serviceName }}
    spec:
      containers:
        - name: minio
          image: {{ $minio.image | quote }}
          imagePullPolicy: {{ $minio.imagePullPolicy }}
          args:
            - server
            - {{ $minio.dataPath }}
            - --console-address
            - :{{ $minio.service.consolePort }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $repo.secretName }}
                  key: {{ $s3.accessKeyKey }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $repo.secretName }}
                  key: {{ $s3.secretKeyKey }}
          ports:
            - name: api
              containerPort: {{ $minio.service.apiPort }}
            - name: console
              containerPort: {{ $minio.service.consolePort }}
          volumeMounts:
            - name: data
              mountPath: {{ $minio.dataPath }}
      volumes:
        - name: data
{{- if $minio.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ $minio.serviceName }}-data
{{- else }}
          emptyDir: {}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $minio.serviceName }}-create-bucket
  namespace: {{ .Release.Namespace }}
spec:
  backoffLimit: 12
  template:
    metadata:
      labels:
        app: {{ $minio.serviceName }}-create-bucket
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-bucket
          image: {{ $minio.bucketInit.image | quote }}
          imagePullPolicy: {{ $minio.bucketInit.imagePullPolicy }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $repo.secretName }}
                  key: {{ $s3.accessKeyKey }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $repo.secretName }}
                  key: {{ $s3.secretKeyKey }}
          command: [sh, -c]
          args:
            - |
              set -eu
              endpoint="http://{{ $minio.serviceName }}:{{ $minio.service.apiPort }}"
              until mc alias set fanout-artifacts "$endpoint" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO at $endpoint..."
                sleep 3
              done
              mc mb --ignore-existing "fanout-artifacts/{{ $s3.bucket }}"
{{- end }}
{{- if $repo.useDefaultConfigMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $repo.configMapName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    workflows.argoproj.io/default-artifact-repository: {{ $repo.configKey }}
data:
  {{ $repo.configKey }}: |
    s3:
      bucket: {{ $s3.bucket }}
      endpoint: {{ $s3.endpoint }}
      insecure: {{ $s3.insecure }}
      accessKeySecret:
        name: {{ $repo.secretName }}
        key: {{ $s3.accessKeyKey }}
      secretKeySecret:
        name: {{ $repo.secretName }}
        key: {{ $s3.secretKeyKey }}
{{- end }}
{{- end }}
