{{- $root := . -}}
{{- $workflow := .Values.workflow -}}
{{- $artifactRepository := .Values.artifactRepository -}}
{{- $feed := .Values.feedService -}}
{{- $like := .Values.likeService -}}
{{- $workflowYear := include "fanout.argo" "workflow.creationTimestamp.Y" -}}
{{- $workflowMonth := include "fanout.argo" "workflow.creationTimestamp.m" -}}
{{- $workflowDay := include "fanout.argo" "workflow.creationTimestamp.d" -}}
{{- $workflowHour := include "fanout.argo" "workflow.creationTimestamp.H" -}}
{{- $workflowMinute := include "fanout.argo" "workflow.creationTimestamp.M" -}}
{{- $workflowSecond := include "fanout.argo" "workflow.creationTimestamp.S" -}}
{{- $workflowStartedAt := printf "%s-%s-%s_%s-%s-%s" $workflowYear $workflowMonth $workflowDay $workflowHour $workflowMinute $workflowSecond -}}
{{- $artifactPath := printf "reports/%s" $workflowStartedAt -}}
{{- if $workflow.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fanout-metrics-pvc
  namespace: {{ $root.Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $workflow.metricsPvc.storage }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $workflow.serviceAccount.name }}
  namespace: {{ $root.Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-role
  namespace: {{ $root.Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-rb
  namespace: {{ $root.Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ $workflow.serviceAccount.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow-role
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: {{ $workflow.template.name }}
  namespace: {{ $root.Release.Namespace }}
spec:
  serviceAccountName: {{ $workflow.serviceAccount.name }}
{{- if and $artifactRepository.enabled $artifactRepository.useDefaultConfigMap }}
  artifactRepositoryRef:
    configMap: {{ $artifactRepository.configMapName }}
    key: {{ $artifactRepository.configKey }}
{{- end }}
  entrypoint: main
  volumes:
    - name: metrics-storage
      persistentVolumeClaim:
        claimName: fanout-metrics-pvc
    - name: promql-config
      configMap:
        name: promql-queries-config
    - name: assistant-collect-script-config
      configMap:
        name: assistant-collect-script-config
        defaultMode: 0555
    - name: assistant-compare-script-config
      configMap:
        name: assistant-compare-script-config
        defaultMode: 0555
    - name: seed-data-script-config
      configMap:
        name: seed-data-script-config
        defaultMode: 0555
    - name: k6-scripts-config
      configMap:
        name: k6-scripts-config
    - name: llm-prompts-config
      configMap:
        name: llm-prompts-config
    - name: html-template-config
      configMap:
        name: html-template-config
  arguments:
    parameters:
      - name: feed-image
        value: {{ $workflow.baselineImages.feed | quote }}
      - name: like-image
        value: {{ $workflow.baselineImages.like | quote }}
      - name: new-feed-image
        value: {{ $workflow.candidateImages.feed | quote }}
      - name: new-like-image
        value: {{ $workflow.candidateImages.like | quote }}
      - name: duration
        value: {{ $workflow.duration | quote }}
      - name: warmup-duration
        value: {{ $workflow.warmupDuration | default "1m" | quote }}
      - name: seed-data-enabled
        value: {{ $workflow.seedData.enabled | quote }}
      - name: seed-data-num-users
        value: {{ $workflow.seedData.numUsers | quote }}
      - name: seed-data-posts-per-user
        value: {{ $workflow.seedData.postsPerUser | quote }}
      - name: run-analysis-enabled
        value: {{ $workflow.runAnalysis.enabled | quote }}

  templates:
    - name: main
      dag:
        tasks:
          - name: deploy-main-version
            template: deploy
            arguments:
              parameters:
                - name: feed-image
                  value: {{ include "fanout.argo" "workflow.parameters.feed-image" | quote }}
                - name: like-image
                  value: {{ include "fanout.argo" "workflow.parameters.like-image" | quote }}

          - name: wait-services
            template: wait-services
            depends: deploy-main-version

          - name: seed-data
            depends: wait-services
            template: seed-data
            when: {{ printf "%s == true" (include "fanout.argo" "workflow.parameters.seed-data-enabled") | quote }}

          - name: warm-up-baseline
            depends: "seed-data.Succeeded || seed-data.Skipped"
            template: run-k6-warmup

          - name: run-baseline
            depends: warm-up-baseline
            template: run-assistant-collect
            arguments:
              parameters:
                - name: report-file
                  value: /data/old-report.json
                - name: artifact-key
                  value: {{ printf "%s/old-report.json" $artifactPath | quote }}
                - name: k6-html-report-file
                  value: /data/old-k6-report.html
                - name: k6-html-artifact-key
                  value: {{ printf "%s/old-k6-report.html" $artifactPath | quote }}

          - name: analyze-baseline
            depends: run-baseline
            template: analyze-run
            when: {{ printf "%s == true" (include "fanout.argo" "workflow.parameters.run-analysis-enabled") | quote }}
            arguments:
              parameters:
                - name: report-file
                  value: /data/old-report.json
                - name: html-report-file
                  value: /data/old-analysis.html
                - name: html-artifact-key
                  value: {{ printf "%s/old-analysis.html" $artifactPath | quote }}

          - name: deploy-new-version
            depends: "analyze-baseline.Succeeded || analyze-baseline.Skipped"
            template: deploy
            arguments:
              parameters:
                - name: feed-image
                  value: {{ include "fanout.argo" "workflow.parameters.new-feed-image" | quote }}
                - name: like-image
                  value: {{ include "fanout.argo" "workflow.parameters.new-like-image" | quote }}

          - name: wait-services-new
            depends: deploy-new-version
            template: wait-services

          - name: warm-up-candidate
            depends: wait-services-new
            template: run-k6-warmup

          - name: run-candidate
            depends: warm-up-candidate
            template: run-assistant-collect
            arguments:
              parameters:
                - name: report-file
                  value: /data/new-report.json
                - name: artifact-key
                  value: {{ printf "%s/new-report.json" $artifactPath | quote }}
                - name: k6-html-report-file
                  value: /data/new-k6-report.html
                - name: k6-html-artifact-key
                  value: {{ printf "%s/new-k6-report.html" $artifactPath | quote }}

          - name: analyze-candidate
            depends: run-candidate
            template: analyze-run
            when: {{ printf "%s == true" (include "fanout.argo" "workflow.parameters.run-analysis-enabled") | quote }}
            arguments:
              parameters:
                - name: report-file
                  value: /data/new-report.json
                - name: html-report-file
                  value: /data/new-analysis.html
                - name: html-artifact-key
                  value: {{ printf "%s/new-analysis.html" $artifactPath | quote }}

          - name: compare-reports
            depends: "analyze-candidate.Succeeded || analyze-candidate.Skipped"
            template: compare-and-analyze

    - name: wait-services
      container:
        image: {{ $workflow.fillImage | quote }}
        command: [sh, -c]
        args:
          - |
            set -eu
            until curl -sf http://feed-svc:{{ $feed.port }}/ready; do echo waiting feed; sleep 3; done
            echo "feed-svc readiness check passed"
            until curl -sf http://like-svc:{{ $like.port }}/ready; do echo waiting like; sleep 3; done
            echo "like-svc readiness check passed"
            until curl -sf {{ $workflow.prometheusUrl }}/-/ready; do echo waiting prometheus; sleep 3; done
            echo "prometheus readiness check passed"
            until curl -sf {{ $workflow.ollamaUrl }}/api/tags >/dev/null; do echo waiting ollama; sleep 5; done
            echo "ollama readiness check passed"

    - name: run-k6-warmup
      container:
        image: {{ $workflow.assistantImage.image | quote }}
        imagePullPolicy: {{ $workflow.assistantImage.pullPolicy }}
        command: [bash, -lc]
        args:
          - |
            set -euo pipefail
            echo "Starting k6 warm-up for {{ include "fanout.argo" "workflow.parameters.warmup-duration" }}"
            k6 run --quiet \
              -e service_url="$service_url" \
              -e duration="$duration" \
              -e K6_CONFIG_FILE="$K6_CONFIG_FILE" \
              "$K6_SCRIPT_FILE"
        volumeMounts:
          - name: k6-scripts-config
            mountPath: /config-k6
        env:
          - name: service_url
            value: {{ $workflow.serviceUrl | quote }}
          - name: duration
            value: {{ include "fanout.argo" "workflow.parameters.warmup-duration" | quote }}
          - name: K6_SCRIPT_FILE
            value: {{ $workflow.k6ScriptFile | quote }}
          - name: K6_CONFIG_FILE
            value: /config-k6/config.json

    - name: seed-data
      container:
        image: alpine:3.19
        command: [sh, -c]
        args:
          - /seed-scripts/seed_data.sh
        volumeMounts:
          - name: seed-data-script-config
            mountPath: /seed-scripts
        env:
          - name: API_URL
            value: {{ printf "http://feed-svc:%v" $feed.port | quote }}
          - name: NUM_USERS
            value: {{ include "fanout.argo" "workflow.parameters.seed-data-num-users" | quote }}
          - name: POSTS_PER_USER
            value: {{ include "fanout.argo" "workflow.parameters.seed-data-posts-per-user" | quote }}

    - name: run-assistant-collect
      inputs:
        parameters:
          - name: report-file
          - name: artifact-key
          - name: k6-html-report-file
          - name: k6-html-artifact-key
      outputs:
        artifacts:
          - name: metrics-report
            path: {{ include "fanout.argo" "inputs.parameters.report-file" | quote }}
            archive:
              none: {}
            s3:
              key: {{ include "fanout.argo" "inputs.parameters.artifact-key" | quote }}
          - name: k6-html-report
            path: {{ include "fanout.argo" "inputs.parameters.k6-html-report-file" | quote }}
            archive:
              none: {}
            s3:
              key: {{ include "fanout.argo" "inputs.parameters.k6-html-artifact-key" | quote }}
      container:
        image: {{ $workflow.assistantImage.image | quote }}
        imagePullPolicy: {{ $workflow.assistantImage.pullPolicy }}
        command: [bash, -lc]
        args:
          - |
            set -euo pipefail
            echo "Starting collect-only assistant step"
            echo "REPORT_FILE=$REPORT_FILE"
            /assistant-scripts/run_stress_collect.sh
        volumeMounts:
          - name: metrics-storage
            mountPath: /data
          - name: promql-config
            mountPath: /config
          - name: assistant-collect-script-config
            mountPath: /assistant-scripts
          - name: k6-scripts-config
            mountPath: /config-k6
        env:
          - name: service_url
            value: {{ $workflow.serviceUrl | quote }}
          - name: prometheus_url
            value: {{ $workflow.prometheusUrl | quote }}
          - name: ollama_url
            value: {{ $workflow.ollamaUrl | quote }}
          - name: duration
            value: {{ include "fanout.argo" "workflow.parameters.duration" | quote }}
          - name: PROMQL_QUERIES_FILE
            value: {{ $workflow.promqlQueriesFile | quote }}
          - name: K6_SCRIPT_FILE
            value: {{ $workflow.k6ScriptFile | quote }}
          - name: REPORT_FILE
            value: {{ include "fanout.argo" "inputs.parameters.report-file" | quote }}
          - name: K6_HTML_REPORT_FILE
            value: {{ include "fanout.argo" "inputs.parameters.k6-html-report-file" | quote }}

    - name: analyze-run
      inputs:
        parameters:
          - name: report-file
          - name: html-report-file
          - name: html-artifact-key
      outputs:
        artifacts:
          - name: run-analysis-html
            path: {{ include "fanout.argo" "inputs.parameters.html-report-file" | quote }}
            archive:
              none: {}
            s3:
              key: {{ include "fanout.argo" "inputs.parameters.html-artifact-key" | quote }}
      container:
        image: {{ $workflow.assistantImage.image | quote }}
        imagePullPolicy: {{ $workflow.assistantImage.pullPolicy }}
        command: [bash, -lc]
        args:
          - |
            set -euo pipefail
            echo "Starting single-run analysis step"
            echo "RUN_REPORT_FILE=$RUN_REPORT_FILE"
            /assistant-scripts/analyze_run.sh
        volumeMounts:
          - name: metrics-storage
            mountPath: /data
          - name: assistant-compare-script-config
            mountPath: /assistant-scripts
          - name: llm-prompts-config
            mountPath: /config-prompts
          - name: html-template-config
            mountPath: /config-html
        env:
          - name: ollama_url
            value: {{ $workflow.ollamaUrl | quote }}
          - name: LLM_TEMPERATURE
            value: {{ $workflow.llmTemperature | quote }}
          - name: RUN_ANALYSIS_PROMPT_FILE
            value: {{ $workflow.runAnalysisPromptFile | quote }}
          - name: RUN_REPORT_FILE
            value: {{ include "fanout.argo" "inputs.parameters.report-file" | quote }}
          - name: HTML_REPORT_FILE
            value: {{ include "fanout.argo" "inputs.parameters.html-report-file" | quote }}
          - name: HTML_TEMPLATE_FILE
            value: {{ $workflow.htmlTemplateFile | quote }}

    - name: deploy
      inputs:
        parameters:
          - name: feed-image
          - name: like-image
      container:
        image: {{ $workflow.kubectlImage | quote }}
        command: [sh, -c]
        args:
          - |
            set -eux

            kubectl set image deployment/feed \
              feed={{ include "fanout.argo" "inputs.parameters.feed-image" }}

            kubectl set image deployment/like \
              like={{ include "fanout.argo" "inputs.parameters.like-image" }}

            kubectl rollout status deployment/feed --timeout=180s
            kubectl rollout status deployment/like --timeout=180s

    - name: compare-and-analyze
      outputs:
        artifacts:
          - name: final-report-html
            path: /data/final-report.html
            archive:
              none: {}
            s3:
              key: {{ printf "%s/final-report.html" $artifactPath | quote }}
      container:
        image: {{ $workflow.assistantImage.image | quote }}
        imagePullPolicy: {{ $workflow.assistantImage.pullPolicy }}
        command: [bash, -lc]
        args:
          - |
            set -euo pipefail
            echo "Starting final compare-and-analyze step"
            echo "BASELINE_FILE=$BASELINE_FILE"
            echo "CANDIDATE_FILE=$CANDIDATE_FILE"
            /assistant-scripts/compare_and_analyze.sh
        volumeMounts:
          - name: metrics-storage
            mountPath: /data
          - name: assistant-compare-script-config
            mountPath: /assistant-scripts
          - name: llm-prompts-config
            mountPath: /config-prompts
          - name: html-template-config
            mountPath: /config-html
        env:
          - name: ollama_url
            value: {{ $workflow.ollamaUrl | quote }}
          - name: LLM_TEMPERATURE
            value: {{ $workflow.llmTemperature | quote }}
          - name: COMPARISON_PROMPT_FILE
            value: {{ $workflow.comparisonPromptFile | quote }}
          - name: BASELINE_FILE
            value: /data/old-report.json
          - name: CANDIDATE_FILE
            value: /data/new-report.json
          - name: HTML_REPORT_FILE
            value: /data/final-report.html
          - name: HTML_TEMPLATE_FILE
            value: {{ $workflow.htmlTemplateFile | quote }}
{{- end }}
