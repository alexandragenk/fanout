services:
  feed-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: feed_svc
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  like-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: like_svc
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  like-svc:
    build:
      context: ./like_svc
    ports:
      - "8086:8086"
    volumes:
      - ./like_svc_cfg.yaml:/app/config.yaml
    depends_on:
      like-db:
        condition: service_healthy

  feed-svc:
    build:
      context: ./feed_svc
    ports:
      - "8080:8080"
    volumes:
      - ./feed_svc_cfg.yaml:/app/config.yaml
    depends_on:
      feed-db:
        condition: service_healthy
      like-svc:
        condition: service_started

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - feed-svc
      - like-svc
      - cadvisor

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    entrypoint: ["sh", "-c"]
    command: '"ollama serve & sleep 5 ; ollama pull gemma4:e4b ; ollama cp gemma4:e4b default ; wait"'
    volumes:
      - ./ollama_cache:/root/.ollama
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "ollama list | tail -n +2 | grep -q ."]
      interval: 5s
      timeout: 3s
      retries: 5
