namespace:
  create: false
  name: fanout

feedService:
  image:
    repository: akalashnikova7/fanout-feed
    tag: latest
    pullPolicy: Always
  port: 8080
  config:
    runAddress: ":8080"
    databaseUri: "postgres://postgres:postgres@feed-db:5432/feed_svc?sslmode=disable"
    likeServiceUrl: "http://like-svc:8086"
    migrationsPath: "file://migrations"
  probes:
    readinessInitialDelaySeconds: 10
    readinessPeriodSeconds: 5
    livenessInitialDelaySeconds: 20
    livenessPeriodSeconds: 10

likeService:
  image:
    repository: akalashnikova7/fanout-like
    tag: latest
    pullPolicy: Always
  port: 8086
  config:
    runAddress: ":8086"
    databaseUri: "postgres://postgres:postgres@like-db:5432/like_svc?sslmode=disable"
    migrationsPath: "file://migrations"
  probes:
    readinessInitialDelaySeconds: 10
    readinessPeriodSeconds: 5
    livenessInitialDelaySeconds: 20
    livenessPeriodSeconds: 10

postgres:
  image:
    repository: postgres
    tag: 15-alpine
  user: postgres
  password: postgres
  feedDb:
    name: feed_svc
    storage: 2Gi
  likeDb:
    name: like_svc
    storage: 2Gi

ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: latest
  port: 11434
  model: gemma4:e4b

observability:
  serviceMonitor:
    enabled: true
    namespace: monitoring
    releaseLabel: kube-prom-stack
    interval: 15s

artifactRepository:
  enabled: true
  useDefaultConfigMap: true
  configMapName: artifact-repositories
  configKey: default-v1
  secretName: argo-artifacts-credentials
  s3:
    bucket: argo-workflows
    endpoint: argo-artifacts:9000
    insecure: true
    accessKey: admin
    secretKey: changeit123
  minio:
    enabled: true
    serviceName: argo-artifacts
    image:
      repository: minio/minio
      tag: latest
      pullPolicy: IfNotPresent
    dataPath: /data
    storage:
      enabled: true
      size: 5Gi
    service:
      apiPort: 9000
      consolePort: 9001

workflow:
  enabled: true
  metricsPvc:
    storage: 200Mi
  serviceAccount:
    name: argo-workflow
  template:
    name: fanout-perftest-pipeline
  assistantImage:
    repository: akalashnikova7/k6
    tag: latest
    pullPolicy: Always
  fillImage:
    repository: curlimages/curl
    tag: 8.7.1
  kubectlImage:
    repository: bitnami/kubectl
    tag: latest
  baselineImages:
    feed:
      repository: akalashnikova7/fanout-feed
      tag: latest
    like:
      repository: akalashnikova7/fanout-like
      tag: latest
  candidateImages:
    feed:
      repository: akalashnikova7/fanout-feed
      tag: test
    like:
      repository: akalashnikova7/fanout-like
      tag: test
  serviceUrl: http://feed-svc:8080
  prometheusUrl: http://kube-prom-stack-kube-prome-prometheus.monitoring.svc:9090
  ollamaUrl: http://ollama:11434
  duration: 2m
  collectScript: ./run_stress_collect.sh
  compareScript: ./compare_and_analyze.sh
  promqlQueriesFile: /config/queries.txt
  k6ScriptFile: /config-k6/load_k6_feed.js
  analysisPromptFile: /config-prompts/analysis-prompt.txt
  comparisonPromptFile: /config-prompts/comparison-prompt.txt
  seedData:
    enabled: false
    numUsers: 16
    postsPerUser: 16

promqlQueries: |
  sum(rate(http_request_duration_ms_count{route='feed'}[$duration]))
  sum(rate(http_request_duration_ms_count{route='likes'}[$duration]))
  histogram_quantile(0.50,sum(rate(http_request_duration_ms_bucket{route='feed'}[$duration]))by(le))
  histogram_quantile(0.95,sum(rate(http_request_duration_ms_bucket{route='feed'}[$duration]))by(le))
  histogram_quantile(0.99,sum(rate(http_request_duration_ms_bucket{route='feed'}[$duration]))by(le))
  ((sum(rate(http_request_duration_ms_sum{route='feed'}[$duration]))/sum(rate(http_request_duration_ms_count{route='feed'}[$duration])))>=0)
  histogram_quantile(0.50,sum(rate(http_request_duration_ms_bucket{route='likes'}[$duration]))by(le))
  histogram_quantile(0.95,sum(rate(http_request_duration_ms_bucket{route='likes'}[$duration]))by(le))
  histogram_quantile(0.99,sum(rate(http_request_duration_ms_bucket{route='likes'}[$duration]))by(le))
  ((sum(rate(http_request_duration_ms_sum{route='likes'}[$duration]))/sum(rate(http_request_duration_ms_count{route='likes'}[$duration])))>=0)
  (100*(sum(rate(http_responses_group_total{route='feed',group='5xx'}[$duration]))/sum(rate(http_responses_group_total{route='feed'}[$duration])))>=0)
  (100*(sum(rate(http_responses_group_total{route='likes',group='5xx'}[$duration]))/sum(rate(http_responses_group_total{route='likes'}[$duration])))>=0)
  sum(rate(container_fs_reads_total{pod=~'feed-db-.*'}[$duration]))
  sum(rate(container_fs_writes_total{pod=~'feed-db-.*'}[$duration]))
  sum(rate(container_fs_reads_total{pod=~'like-db-.*'}[$duration]))
  sum(rate(container_fs_writes_total{pod=~'like-db-.*'}[$duration]))
  (container_memory_usage_bytes{pod=~'feed-svc-.*'}/1048576)
  (container_memory_usage_bytes{pod=~'like-svc-.*'}/1048576)
  (container_memory_usage_bytes{pod=~'feed-db-.*'}/1048576)
  (container_memory_usage_bytes{pod=~'like-db-.*'}/1048576)
  rate(container_cpu_usage_seconds_total{pod=~'feed-svc-.*',cpu='total'}[$duration])
  rate(container_cpu_usage_seconds_total{pod=~'like-svc-.*',cpu='total'}[$duration])
  rate(container_cpu_usage_seconds_total{pod=~'feed-db-.*',cpu='total'}[$duration])
  rate(container_cpu_usage_seconds_total{pod=~'like-db-.*',cpu='total'}[$duration])

k6Script: |
  import http from 'k6/http';

  export const options = {
      stages: [
          { duration: '2m', target: 50 }
      ],
  };

  const base_url = __ENV.service_url || 'http://localhost:8080';

  export default function () {
      http.get(base_url + '/feed', {
          headers: {
              'X-User-Id': String(__VU),
          },
      });
  }

analysisPrompt: |
  Проведен стресс-тест сервиса лент.
  Он использует сервис лайков.

  Ниже приведены метрики k6:
  {{K6_OUTPUT}}

  Ниже приведены метрики Prometheus по обоим сервисам, базам данных и ресурсам контейнеров:
  {{PROMETHEUS_METRICS}}

  Проанализируй результаты:
  1. Найди аномалии.
  2. Предложи возможные причины.
  3. Сделай краткий вывод.
  4. Отдельно укажи, если метрики выглядят невалидными из-за отсутствия нагрузки, NaN или нулевых значений.

comparisonPrompt: |
  Проведено два нагрузочных запуска распределённого приложения.

  Ниже приведён вывод k6 первого запуска baseline:
  {{BASELINE_K6}}

  Ниже приведён вывод k6 второго запуска candidate:
  {{CANDIDATE_K6}}

  Ниже приведено численное сравнение Prometheus-метрик.
  Это основной источник истины для сравнения baseline и candidate:

  {{COMPARISON_LINES}}

  Топ-5 метрик с наибольшим ростом:
  {{TOP_REGRESSIONS}}

  Топ-5 метрик с наибольшим снижением:
  {{TOP_IMPROVEMENTS}}

  Нужно:
  1. Оценить k6 baseline и k6 candidate.
  2. Сравнить именно Prometheus-метрики из списка выше, ссылаясь на конкретные query и числа.
  3. Найти деградации и улучшения.
  4. Указать наиболее вероятные узкие места.
  5. Если какие-то diff близки к нулю, считать их несущественными и не делать на них сильных выводов.
  6. Сделать краткий итоговый вывод.
  7. Не писать, что числовые метрики отсутствуют: они приведены выше в явном виде.

argocdApplication:
  enabled: false
  namespace: argocd
  name: fanout
  project: default
  repoURL: https://github.com/alexandragenk/fanout.git
  targetRevision: test
  path: charts/fanout
  destinationServer: https://kubernetes.default.svc
  destinationNamespace: fanout
  syncOptions:
    - CreateNamespace=true
