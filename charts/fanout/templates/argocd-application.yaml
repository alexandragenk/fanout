{{- if .Values.argocdApplication.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.argocdApplication.name }}
  namespace: {{ .Values.argocdApplication.namespace }}
spec:
  project: {{ .Values.argocdApplication.project }}
  source:
    repoURL: {{ .Values.argocdApplication.repoURL | quote }}
    targetRevision: {{ .Values.argocdApplication.targetRevision | quote }}
    path: {{ .Values.argocdApplication.path | quote }}
  destination:
    server: {{ .Values.argocdApplication.destinationServer | quote }}
    namespace: {{ .Values.argocdApplication.destinationNamespace | quote }}
  syncPolicy:
    syncOptions:
{{- range .Values.argocdApplication.syncOptions }}
      - {{ . }}
{{- end }}
{{- end }}
