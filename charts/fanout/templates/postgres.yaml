apiVersion: v1
kind: Service
metadata:
  name: feed-db
  namespace: {{ include "fanout.namespace" . }}
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: feed-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: feed-db
  namespace: {{ include "fanout.namespace" . }}
spec:
  serviceName: feed-db
  replicas: 1
  selector:
    matchLabels:
      app: feed-db
  template:
    metadata:
      labels:
        app: feed-db
        app.kubernetes.io/name: feed-db
        metrics_group: feed-db
    spec:
      containers:
        - name: postgres
          image: {{ printf "%s:%s" .Values.postgres.image.repository .Values.postgres.image.tag | quote }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.feedDb.name | quote }}
          readinessProbe:
            exec:
              command: ["sh", "-c", {{ printf "pg_isready -U %s -d %s" .Values.postgres.user .Values.postgres.feedDb.name | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.feedDb.storage }}
---
